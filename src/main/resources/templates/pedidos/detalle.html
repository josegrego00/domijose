<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Detalle Pedido #<span th:text="${pedido.id}"></span> - DomiJose</title>
    <link rel="stylesheet" th:href="@{/css/marketplace.css}">
</head>
<body>

    <div th:replace="~{fragmentos/header :: header}"></div>

    <main class="container">
        <a th:href="@{/pedidos/mis-pedidos}" class="back-link">← Volver a mis pedidos</a>
        
        <h1 class="page-title">📦 Pedido #<span th:text="${pedido.id}"></span></h1>

        <div class="order-detail">
            <div class="order-status-card">
                <span class="status-label">Estado:</span>
                <span class="status-value" th:class="${'badge badge-' + pedido.status.name().toLowerCase()}" 
                      th:text="${pedido.status.name()}"></span>
            </div>

            <div class="order-date-info">
                <p>📅 Fecha: <span th:text="${#temporals.format(pedido.orderDate, 'dd/MM/yyyy HH:mm')}"></span></p>
            </div>

            <div class="order-items">
                <h2>🛒 Productos</h2>
                <div th:each="item : ${pedido.items}" class="order-item">
                    <div class="item-info">
                        <span class="item-name" th:text="${item.productName}"></span>
                        <span class="item-qty">x<span th:text="${item.quantity}"></span></span>
                    </div>
                    <div class="item-price">
                        $<span th:text="${#numbers.formatDecimal(item.unitPrice, 1, 2)}"></span>
                    </div>
                    <div class="item-subtotal">
                        $<span th:text="${#numbers.formatDecimal(item.subtotal, 1, 2)}"></span>
                    </div>
                </div>
            </div>

            <div class="order-total">
                <span>Total:</span>
                <span class="total-amount">$<span th:text="${#numbers.formatDecimal(pedido.totalAmount, 1, 2)}"></span></span>
            </div>

            <div class="order-cancel" th:if="${pedido.cancelable}">
                <form th:action="@{/pedidos/{id}/cancelar(id=${pedido.id})}" method="post">
                    <button type="submit" class="btn-danger" 
                            onclick="return confirm('¿Estás seguro de cancelar este pedido?')">
                        ❌ Cancelar Pedido
                    </button>
                </form>
            </div>

            <div class="order-cancel-info" th:if="${not pedido.cancelable}">
                <p>Este pedido no puede ser cancelado porque ya está <span th:text="${pedido.status.name()}"></span></p>
            </div>

            <div class="whatsapp-notification" th:if="${whatsappLink}">
                <p>📱 Te hemos enviado una notificación de confirmación por WhatsApp</p>
                <a th:href="${whatsappLink}" target="_blank" class="btn-whatsapp">
                    📱 Ver en WhatsApp
                </a>
            </div>
        </div>
    </main>

    <div th:replace="~{fragmentos/footer :: footer}"></div>

</body>
</html>
