<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Registrarse - Domijose</title>
    <link rel="stylesheet" th:href="@{/css/registro.css}">
</head>
<body>
    <div class="container">
        <div class="register-card">
            <div class="icon-circle">🍽️</div>
            
            <h2>Crear Cuenta</h2>
            
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            
            <form th:action="@{/registro}" th:object="${userRequest}" method="post">
                <div class="form-group">
                    <input type="email" 
                           th:field="*{email}" 
                           class="form-control" 
                           placeholder="Correo electrónico"
                           autocomplete="email"
                           required>
                </div>
                
                <div class="form-group">
                    <input type="text" 
                           th:field="*{fullName}" 
                           class="form-control" 
                           placeholder="Nombre completo"
                           autocomplete="name"
                           required>
                </div>
                
                <div class="form-group">
                    <input type="tel" 
                           th:field="*{phone}" 
                           class="form-control" 
                           placeholder="Número de teléfono"
                           autocomplete="tel"
                           pattern="[0-9]{10,}"
                           title="Ingresa 10 dígitos"
                           required>
                </div>
                
                <div class="form-group">
                    <input type="password" 
                           th:field="*{password}" 
                           class="form-control" 
                           placeholder="Contraseña (mínimo 6 caracteres)"
                           autocomplete="new-password"
                           required>
                </div>
                
                <button type="submit" class="btn-register">Crear Cuenta</button>
                
                <a th:href="@{/login}" class="login-link">
                    ¿Ya tienes cuenta? Inicia sesión
                </a>
            </form>
        </div>
    </div>
</body>
</html>
