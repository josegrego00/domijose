<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title th:text="${producto.id != null ? 'Editar producto' : 'Nuevo producto'}">Formulario - DomiJose</title>
    <link rel="stylesheet" th:href="@{/css/marketplace.css}">
</head>
<body>

    <div th:replace="~{fragmentos/header :: header}"></div>

    <div class="container">
        <a th:href="@{/productos}" style="color: #7ED957; display: block; margin: 16px 0;">← Volver a productos</a>
        
        <div class="form-container">
            <h2 th:text="${producto.id != null ? 'Editar producto' : 'Nuevo producto'}">Formulario</h2>
            
            <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>
            
            <form th:action="${producto.id != null ? '/productos/' + producto.id : '/productos'}" 
                  th:object="${producto}" 
                  method="post"
                  enctype="multipart/form-data">
                
                <div class="form-group">
                    <label for="name">Nombre del producto</label>
                    <input type="text" id="name" th:field="*{name}" required>
                </div>
                
                <div class="form-group">
                    <label for="description">Descripción</label>
                    <textarea id="description" th:field="*{description}"></textarea>
                </div>
                
                <div class="form-group">
                    <label for="price">Precio</label>
                    <input type="number" id="price" th:field="*{price}" step="0.01" min="0" required>
                </div>
                
                <div class="form-group">
                    <label for="stock">Stock</label>
                    <input type="number" id="stock" th:field="*{stock}" min="0" required>
                </div>
                
                <div class="form-group">
                    <label for="category">Categoría</label>
                    <input type="text" id="category" th:field="*{category}">
                </div>
                
                <div class="form-group">
                    <label for="imagen">Imagen del producto</label>
                    <input type="file" id="imagen" name="imagen" accept="image/*">
                    <div th:if="${producto.imageUrl}" style="margin-top: 8px;">
                        <img th:src="@{${producto.imageUrl}}" style="max-width: 150px; border-radius: 8px;">
                        <p style="color: #666; font-size: 12px; margin-top: 4px;">Imagen actual</p>
                    </div>
                    <small style="color: #999; display: block; margin-top: 4px;">Formats: JPG, PNG, GIF (max 10MB)</small>
                </div>
                
                <button type="submit" class="btn-form" th:text="${producto.id != null ? 'Actualizar' : 'Crear'}">Guardar</button>
                
                <a th:href="@{/productos}" class="btn-form btn-form-secondary" style="display: block; text-align: center; text-decoration: none;">Cancelar</a>
            </form>
        </div>
    </div>

    <div th:replace="~{fragmentos/footer :: footer}"></div>

</body>
</html>
