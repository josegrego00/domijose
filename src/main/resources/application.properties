# Application
spring.application.name=domijose

# Server
server.port=8080

# Datasource MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/domijose?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=America/Bogota
spring.datasource.username=root
spring.datasource.password=Kristoff_Mora26123009
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
    
# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8

# Static Resources
spring.web.resources.static-locations=classpath:/static/,file:static/

# Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true
app.upload.path=src/main/resources/static/images/productos/
app.upload.url=/images/productos/
app.upload.path.qr=src/main/resources/static/images/qr/
app.upload.url.qr=/images/qr/

# Session
server.servlet.session.timeout=30m

# Logging
logging.level.root=INFO
logging.level.com.domicilio.domijose=DEBUG
logging.level.org.springframework.security=DEBUG



